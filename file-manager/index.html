<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Manager</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* Progress bar animation */
    @keyframes progress-stripe {
      from { background-position: 1rem 0; }
      to   { background-position: 0 0; }
    }
    .progress-animated {
      background-image: linear-gradient(
        45deg,
        rgba(255,255,255,.15) 25%,
        transparent 25%,
        transparent 50%,
        rgba(255,255,255,.15) 50%,
        rgba(255,255,255,.15) 75%,
        transparent 75%,
        transparent
      );
      background-size: 1rem 1rem;
      animation: progress-stripe 1s linear infinite;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen font-sans">

  <!-- ── Auth Screen ─────────────────────────────────────────── -->
  <div id="auth-screen" class="flex flex-col items-center justify-center min-h-screen gap-4">
    <div class="text-center mb-2">
      <h1 class="text-2xl font-semibold text-gray-900">File Manager</h1>
      <p class="text-sm text-gray-500 mt-1">Your files, stored in your Google Drive.</p>
    </div>
    <button
      id="sign-in-btn"
      class="flex items-center gap-2 px-5 py-2.5 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50 transition"
    >
      <svg class="w-4 h-4" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <!-- ── App Shell ───────────────────────────────────────────── -->
  <div id="app" class="hidden min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-100 px-6 py-3 flex items-center justify-between">
      <h1 class="text-base font-semibold text-gray-900">File Manager</h1>
      <div class="flex items-center gap-3">
        <span id="storage-info" class="text-xs text-gray-400"></span>
        <button
          id="sign-out-btn"
          class="text-xs text-gray-500 hover:text-gray-800 transition"
        >Sign out</button>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="bg-white border-b border-gray-100 px-6 py-3 flex items-center gap-3">
      <!-- Upload button (triggers hidden file input) -->
      <button
        id="upload-btn"
        class="flex items-center gap-1.5 px-3 py-1.5 bg-gray-900 text-white text-xs font-medium rounded-md hover:bg-gray-700 transition"
      >
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        Upload
      </button>
      <input id="file-input" type="file" multiple class="hidden" />

      <!-- Search -->
      <input
        id="search-input"
        type="text"
        placeholder="Filter files..."
        class="ml-auto text-xs border border-gray-200 rounded-md px-3 py-1.5 w-48 focus:outline-none focus:border-gray-400 bg-gray-50"
      />
    </div>

    <!-- Upload Progress Area -->
    <div id="upload-progress-area" class="hidden px-6 py-3 bg-blue-50 border-b border-blue-100 space-y-2">
      <!-- Progress bars injected here by ui.js -->
    </div>

    <!-- File Grid -->
    <main class="flex-1 p-6">
      <div id="empty-state" class="hidden flex flex-col items-center justify-center h-64 text-gray-400 gap-2">
        <svg class="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
        </svg>
        <p class="text-sm">No files yet. Upload something.</p>
      </div>

      <div id="file-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
        <!-- File cards injected here by ui.js -->
      </div>
    </main>
  </div>

  <!-- ── Rename Modal ────────────────────────────────────────── -->
  <div id="rename-modal" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl p-6 w-80 space-y-4">
      <h2 class="text-sm font-semibold text-gray-900">Rename file</h2>
      <input
        id="rename-input"
        type="text"
        class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-gray-400"
        placeholder="New filename"
      />
      <div class="flex gap-2 justify-end">
        <button id="rename-cancel-btn" class="text-xs text-gray-500 hover:text-gray-800 px-3 py-1.5 transition">Cancel</button>
        <button id="rename-confirm-btn" class="text-xs bg-gray-900 text-white px-3 py-1.5 rounded-md hover:bg-gray-700 transition">Rename</button>
      </div>
    </div>
  </div>

  <!-- ── Preview Modal ───────────────────────────────────────── -->
  <div id="preview-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="relative bg-white rounded-xl shadow-2xl max-w-3xl w-full mx-4 overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
        <span id="preview-filename" class="text-sm font-medium text-gray-700 truncate"></span>
        <button id="preview-close-btn" class="text-gray-400 hover:text-gray-700 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="preview-content" class="p-4 flex items-center justify-center min-h-48 max-h-[70vh] overflow-auto">
        <!-- Injected by ui.js -->
      </div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────── -->
  <div id="toast" class="hidden fixed bottom-5 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-xs px-4 py-2 rounded-full shadow-lg z-50 transition-all"></div>

  <!-- JS Modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
